<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>משחק אוצר מילים 🎯</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{overflow-x:hidden;}
body{
  font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,'Heebo',Arial,sans-serif;
  background:linear-gradient(135deg,#667eea 0%,#764ba2 50%,#f093fb 100%);
  background-size:200% 200%;
  animation:bgShift 15s ease infinite;
  min-height:100vh;
  display:flex;align-items:flex-start;justify-content:center;
  padding:1rem;
  position:relative;
}
@keyframes bgShift{
  0%,100%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
}

.bg-bubbles{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0;}
.bubble{position:absolute;border-radius:50%;background:rgba(255,255,255,0.15);animation:float 18s infinite linear;bottom:-100px;}
@keyframes float{
  0%{transform:translateY(0) scale(0);opacity:0;}
  10%{opacity:1;}
  90%{opacity:1;}
  100%{transform:translateY(-110vh) scale(1.2);opacity:0;}
}

.game{
  background:rgba(255,255,255,0.97);
  border-radius:28px;
  padding:1.5rem;
  max-width:520px;width:100%;
  box-shadow:0 20px 60px rgba(0,0,0,0.3),inset 0 0 0 1px rgba(255,255,255,0.5);
  position:relative;
  z-index:1;
  animation:gameIn 0.6s cubic-bezier(.34,1.56,.64,1);
}
@keyframes gameIn{
  0%{transform:scale(0.85) translateY(40px);opacity:0;}
  100%{transform:scale(1) translateY(0);opacity:1;}
}

h1{
  text-align:center;
  font-size:30px;
  margin-bottom:1rem;
  background:linear-gradient(135deg,#c2185b,#7b1fa2,#3f51b5);
  background-size:200% 200%;
  -webkit-background-clip:text;background-clip:text;color:transparent;
  animation:gradTitle 4s ease infinite;
  font-weight:800;letter-spacing:-0.5px;
}
@keyframes gradTitle{
  0%,100%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
}

.top-bar{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:0.8rem;padding:0.7rem 1rem;
  background:linear-gradient(135deg,#fce4ec,#f3e5f5);
  border-radius:18px;
  box-shadow:0 4px 12px rgba(194,24,91,0.15);
}
.score-box{text-align:center;flex:1;}
.score-num{font-size:22px;font-weight:800;color:#c2185b;display:inline-block;}
.score-num.pop{animation:popScore 0.5s ease;}
@keyframes popScore{
  0%,100%{transform:scale(1);color:#c2185b;}
  50%{transform:scale(1.5);color:#43a047;}
}
.score-lbl{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:1.5px;font-weight:600;}
.lives{font-size:24px;letter-spacing:3px;}
.lives .heart{display:inline-block;transition:transform 0.3s;}
.lives .heart.lost{animation:heartLose 0.6s ease forwards;}
@keyframes heartLose{
  0%{transform:scale(1) rotate(0);}
  30%{transform:scale(1.6) rotate(-15deg);}
  100%{transform:scale(0.9) rotate(0);}
}

.progress-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:1rem;justify-content:center;}
.dot{width:12px;height:12px;border-radius:50%;background:#e0e0e0;transition:all 0.3s cubic-bezier(.34,1.56,.64,1);}
.dot.good{background:linear-gradient(135deg,#43a047,#66bb6a);transform:scale(1.1);box-shadow:0 2px 6px rgba(67,160,71,0.4);}
.dot.bad{background:linear-gradient(135deg,#e53935,#ef5350);transform:scale(1.1);box-shadow:0 2px 6px rgba(229,57,53,0.4);}
.dot.cur{
  background:linear-gradient(135deg,#c2185b,#7b1fa2);
  transform:scale(1.5);
  box-shadow:0 0 0 4px rgba(194,24,91,0.25),0 3px 8px rgba(194,24,91,0.5);
  animation:dotPulse 1.4s ease infinite;
}
@keyframes dotPulse{
  0%,100%{box-shadow:0 0 0 4px rgba(194,24,91,0.25),0 3px 8px rgba(194,24,91,0.5);}
  50%{box-shadow:0 0 0 8px rgba(194,24,91,0.15),0 3px 10px rgba(194,24,91,0.6);}
}

.card{
  background:linear-gradient(135deg,#fce4ec,#f3e5f5);
  border-radius:22px;padding:1.75rem 1.5rem;
  text-align:center;margin-bottom:1rem;
  box-shadow:0 6px 20px rgba(194,24,91,0.15),inset 0 0 0 1px rgba(255,255,255,0.6);
  animation:cardIn 0.5s cubic-bezier(.34,1.56,.64,1);
  position:relative;overflow:hidden;
}
@keyframes cardIn{
  0%{transform:scale(0.9) translateY(20px);opacity:0;}
  100%{transform:scale(1) translateY(0);opacity:1;}
}
.unit-tag{
  display:inline-block;font-size:11px;font-weight:700;
  padding:4px 14px;border-radius:14px;
  background:linear-gradient(135deg,#c2185b,#7b1fa2);
  color:white;margin-bottom:0.75rem;letter-spacing:0.5px;
  box-shadow:0 3px 8px rgba(194,24,91,0.4);
}
.q-label{font-size:14px;color:#7b1fa2;margin-bottom:0.5rem;font-weight:600;}
.big-word{
  font-size:44px;font-weight:800;color:#c2185b;
  margin-bottom:0.5rem;line-height:1.2;
  background:linear-gradient(135deg,#c2185b,#7b1fa2);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  animation:wordIn 0.5s cubic-bezier(.34,1.56,.64,1) 0.1s backwards;
}
@keyframes wordIn{
  0%{transform:scale(0.5) rotate(-5deg);opacity:0;}
  100%{transform:scale(1) rotate(0);opacity:1;}
}
.speak-btn{
  display:inline-flex;align-items:center;gap:6px;margin-top:0.4rem;
  padding:9px 22px;border-radius:22px;border:none;
  background:linear-gradient(135deg,#c2185b,#7b1fa2);
  color:white;font-size:14px;font-weight:700;cursor:pointer;
  box-shadow:0 4px 12px rgba(194,24,91,0.4);
  font-family:inherit;
}
.speak-btn:active{transform:scale(0.95);}
.speak-btn.playing{animation:speakerPulse 0.6s ease infinite;}
@keyframes speakerPulse{
  0%,100%{box-shadow:0 4px 12px rgba(194,24,91,0.4);}
  50%{box-shadow:0 4px 20px rgba(194,24,91,0.7),0 0 0 6px rgba(194,24,91,0.2);}
}
.meaning-box{
  margin-top:0.75rem;padding:0.6rem 1rem;
  background:linear-gradient(135deg,#a5d6a7,#66bb6a);
  color:white;border-radius:12px;font-size:15px;font-weight:700;
  display:none;
  box-shadow:0 4px 10px rgba(67,160,71,0.3);
  animation:meaningIn 0.4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes meaningIn{
  0%{transform:scale(0.5);opacity:0;}
  100%{transform:scale(1);opacity:1;}
}

.options{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem;}
.opt{
  padding:16px 8px;border-radius:14px;border:none;
  background:white;color:#333;font-size:16px;font-weight:600;
  cursor:pointer;transition:transform 0.2s cubic-bezier(.34,1.56,.64,1),box-shadow 0.2s;
  text-align:center;
  box-shadow:0 3px 0 #d4d4d4,0 5px 12px rgba(0,0,0,0.1);
  animation:optIn 0.4s cubic-bezier(.34,1.56,.64,1) backwards;
  font-family:inherit;
}
.opt:nth-child(1){animation-delay:0.15s;}
.opt:nth-child(2){animation-delay:0.22s;}
.opt:nth-child(3){animation-delay:0.29s;}
.opt:nth-child(4){animation-delay:0.36s;}
@keyframes optIn{
  0%{transform:translateY(20px);opacity:0;}
  100%{transform:translateY(0);opacity:1;}
}
.opt:active:not(:disabled){transform:translateY(2px);box-shadow:0 1px 0 #d4d4d4,0 2px 6px rgba(0,0,0,0.1);}
.opt.correct{
  background:linear-gradient(135deg,#a5d6a7,#66bb6a);
  color:white;
  box-shadow:0 3px 0 #2e7d32,0 6px 18px rgba(67,160,71,0.5);
  animation:correctPop 0.6s cubic-bezier(.34,1.56,.64,1);
}
@keyframes correctPop{
  0%{transform:scale(1);}
  40%{transform:scale(1.15) rotate(-2deg);}
  70%{transform:scale(0.97) rotate(1deg);}
  100%{transform:scale(1) rotate(0);}
}
.opt.wrong{
  background:linear-gradient(135deg,#ffcdd2,#ef5350);
  color:white;
  box-shadow:0 3px 0 #b71c1c,0 5px 14px rgba(229,57,53,0.4);
  animation:shake 0.5s ease;
}
@keyframes shake{
  0%,100%{transform:translateX(0);}
  20%{transform:translateX(-8px);}
  40%{transform:translateX(8px);}
  60%{transform:translateX(-6px);}
  80%{transform:translateX(6px);}
}
.opt:disabled{cursor:default;}

.feedback{text-align:center;font-size:18px;font-weight:700;min-height:28px;margin-bottom:0.75rem;}
.feedback.good{color:#2e7d32;animation:goodFb 0.5s cubic-bezier(.34,1.56,.64,1);}
.feedback.bad{color:#c62828;animation:badFb 0.3s ease;}
@keyframes goodFb{
  0%{transform:scale(0.5) translateY(10px);opacity:0;}
  100%{transform:scale(1) translateY(0);opacity:1;}
}
@keyframes badFb{
  0%,100%{transform:translateX(0);}
  25%{transform:translateX(-5px);}
  75%{transform:translateX(5px);}
}

.next-btn{
  width:100%;padding:14px;border-radius:16px;border:none;
  background:linear-gradient(135deg,#43a047,#66bb6a);
  color:white;font-size:17px;font-weight:700;cursor:pointer;
  display:none;
  box-shadow:0 4px 0 #2e7d32,0 6px 20px rgba(67,160,71,0.4);
  font-family:inherit;
  animation:nextBtnIn 0.5s cubic-bezier(.34,1.56,.64,1);
  position:relative;overflow:hidden;
}
@keyframes nextBtnIn{
  0%{transform:scale(0);opacity:0;}
  100%{transform:scale(1);opacity:1;}
}
.next-btn:active{transform:translateY(3px);box-shadow:0 1px 0 #2e7d32,0 2px 10px rgba(67,160,71,0.4);}
.next-btn::after{
  content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.45),transparent);
  animation:shine 2.2s infinite;
}
@keyframes shine{
  0%{left:-100%;}
  60%,100%{left:100%;}
}

.confetti{
  position:fixed;width:10px;height:14px;
  pointer-events:none;z-index:9999;top:-20px;
  animation:confettiFall linear forwards;
}
@keyframes confettiFall{
  0%{transform:translateY(0) rotate(0);opacity:1;}
  100%{transform:translateY(110vh) rotate(720deg);opacity:0;}
}

.combo-badge{
  position:fixed;top:25%;left:50%;
  background:linear-gradient(135deg,#ff6b6b,#ee5a6f);
  color:white;padding:14px 32px;border-radius:30px;
  font-size:22px;font-weight:800;
  box-shadow:0 8px 30px rgba(238,90,111,0.55);
  pointer-events:none;z-index:9998;
  animation:comboShow 1.3s ease forwards;
  white-space:nowrap;
}
@keyframes comboShow{
  0%{transform:translateX(-50%) scale(0) rotate(-15deg);opacity:0;}
  20%{transform:translateX(-50%) scale(1.35) rotate(6deg);opacity:1;}
  40%{transform:translateX(-50%) scale(1) rotate(0);opacity:1;}
  80%{transform:translateX(-50%) scale(1) translateY(0);opacity:1;}
  100%{transform:translateX(-50%) scale(0.8) translateY(-40px);opacity:0;}
}

.end{text-align:center;padding:1.5rem 1rem;animation:gameIn 0.6s cubic-bezier(.34,1.56,.64,1);}
.end-emoji{font-size:90px;margin-bottom:0.3rem;animation:trophyBounce 1.2s ease infinite;display:inline-block;}
@keyframes trophyBounce{
  0%,100%{transform:translateY(0) rotate(-5deg);}
  50%{transform:translateY(-18px) rotate(5deg);}
}
.end-title{
  font-size:32px;font-weight:800;margin-bottom:0.3rem;
  background:linear-gradient(135deg,#c2185b,#7b1fa2);
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.end-sub{font-size:17px;color:#666;margin-bottom:1.2rem;font-weight:600;}
.stars{font-size:42px;margin-bottom:1.2rem;letter-spacing:6px;}
.stars span{display:inline-block;animation:starPop 0.5s cubic-bezier(.34,1.56,.64,1) backwards;}
.stars span:nth-child(1){animation-delay:0.2s;}
.stars span:nth-child(2){animation-delay:0.4s;}
.stars span:nth-child(3){animation-delay:0.6s;}
@keyframes starPop{
  0%{transform:scale(0) rotate(-180deg);opacity:0;}
  100%{transform:scale(1) rotate(0);opacity:1;}
}
.again-btn{
  padding:15px 36px;border-radius:24px;border:none;
  background:linear-gradient(135deg,#c2185b,#7b1fa2);
  color:white;font-size:18px;font-weight:700;cursor:pointer;
  box-shadow:0 4px 0 #4a148c,0 6px 20px rgba(194,24,91,0.4);
  font-family:inherit;
}
.again-btn:active{transform:translateY(3px);box-shadow:0 1px 0 #4a148c,0 2px 10px rgba(194,24,91,0.4);}
</style>
</head>
<body>
<div class="bg-bubbles" id="bubbles"></div>
<div class="game">
  <h1>🎯 משחק אוצר מילים</h1>
  <div class="top-bar">
    <div class="score-box"><div class="score-num" id="score">0</div><div class="score-lbl">נקודות</div></div>
    <div class="lives" id="lives"></div>
    <div class="score-box"><div class="score-num" id="qnum">1/15</div><div class="score-lbl">שאלה</div></div>
  </div>
  <div class="progress-row" id="progress"></div>
  <div id="main"></div>
</div>

<script>
var allItems = [
  {w:"bottle", he:"בקבוק", unit:"יחידה 1"},
  {w:"cellphone", he:"טלפון נייד / סלולר", unit:"יחידה 1"},
  {w:"city", he:"עיר", unit:"יחידה 1"},
  {w:"glass", he:"זכוכית", unit:"יחידה 1"},
  {w:"leave", he:"לעזוב, לצאת", unit:"יחידה 1"},
  {w:"remember", he:"לזכור", unit:"יחידה 1"},
  {w:"take a shower", he:"להתקלח", unit:"יחידה 1"},
  {w:"teeth", he:"שיניים", unit:"יחידה 1"},
  {w:"turn off", he:"לכבות, לסגור", unit:"יחידה 1"},
  {w:"usually", he:"בדרך כלל", unit:"יחידה 1"},
  {w:"wash", he:"לכבס, לרחוץ, לשטוף", unit:"יחידה 1"},
  {w:"world", he:"עולם", unit:"יחידה 1"},
  {w:"back", he:"גב", unit:"יחידה 2"},
  {w:"fall", he:"לנפול", unit:"יחידה 2"},
  {w:"finish", he:"לסיים", unit:"יחידה 2"},
  {w:"forest", he:"יער", unit:"יחידה 2"},
  {w:"have fun", he:"לבלות, ליהנות", unit:"יחידה 2"},
  {w:"kilogram", he:"קילוגרם", unit:"יחידה 2"},
  {w:"large", he:"גדול", unit:"יחידה 2"},
  {w:"look like", he:"להיות דומה ל-", unit:"יחידה 2"},
  {w:"magazine", he:"מגזין", unit:"יחידה 2"},
  {w:"no", he:"אין", unit:"יחידה 2"},
  {w:"visit", he:"לבקר", unit:"יחידה 2"},
  {w:"work (n)", he:"עבודה", unit:"יחידה 2"},
  {w:"go", he:"ללכת, לנסוע, להסתלק מ-", unit:"יחידה 3"},
  {w:"leave (go)", he:"לצאת", unit:"יחידה 3"},
  {w:"enter", he:"להיכנס", unit:"יחידה 3"},
  {w:"shop", he:"לעשות קניות", unit:"יחידה 3"},
  {w:"bank", he:"בנק", unit:"יחידה 4"},
  {w:"between", he:"בין", unit:"יחידה 4"},
  {w:"cinema", he:"קולנוע", unit:"יחידה 4"},
  {w:"fast food", he:"מזון מהיר", unit:"יחידה 4"},
  {w:"museum", he:"מוזיאון", unit:"יחידה 4"},
  {w:"on the left", he:"משמאל", unit:"יחידה 4"},
  {w:"on the right", he:"מימין", unit:"יחידה 4"},
  {w:"plant (n)", he:"צמח, עציץ", unit:"יחידה 4"},
  {w:"river", he:"נהר", unit:"יחידה 4"},
  {w:"sand", he:"חול", unit:"יחידה 4"},
  {w:"straight", he:"ישר", unit:"יחידה 4"},
  {w:"supermarket", he:"סופרמרקט", unit:"יחידה 4"},
  {w:"because of", he:"בגלל", unit:"יחידה 5"},
  {w:"better", he:"יותר טוב", unit:"יחידה 5"},
  {w:"busy", he:"עסוק", unit:"יחידה 5"},
  {w:"change", he:"לשנות, להחליף, להשתנות", unit:"יחידה 5"},
  {w:"go on", he:"לקרות", unit:"יחידה 5"},
  {w:"have a problem", he:"יש בעיה", unit:"יחידה 5"},
  {w:"here", he:"כאן", unit:"יחידה 5"},
  {w:"letter", he:"מכתב", unit:"יחידה 5"},
  {w:"life", he:"חיים", unit:"יחידה 5"},
  {w:"plan (v)", he:"לתכנן", unit:"יחידה 5"},
  {w:"send", he:"לשלוח", unit:"יחידה 5"},
  {w:"too", he:"גם כן", unit:"יחידה 5"}
];

var ROUND_SIZE = 15;
var questions=[],qi=0,score=0,lives=3,answered=false,streak=0;
var confettiColors=['#c2185b','#7b1fa2','#3f51b5','#43a047','#ff9800','#f44336','#00bcd4','#ffeb3b'];

function shuffle(a){return a.slice().sort(function(){return Math.random()-0.5;});}

function makeBubbles(){
  var c=document.getElementById('bubbles');
  for(var i=0;i<14;i++){
    var b=document.createElement('div');
    b.className='bubble';
    var size=20+Math.random()*80;
    b.style.width=size+'px';
    b.style.height=size+'px';
    b.style.left=(Math.random()*100)+'%';
    b.style.animationDelay=(Math.random()*18)+'s';
    b.style.animationDuration=(14+Math.random()*12)+'s';
    c.appendChild(b);
  }
}

function speak(text){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(text);
  u.lang='en-US';u.rate=0.85;u.pitch=1.0;
  window.speechSynthesis.speak(u);
}

function makeConfetti(count){
  for(var i=0;i<count;i++){
    var c=document.createElement('div');
    c.className='confetti';
    c.style.left=(Math.random()*100)+'%';
    c.style.background=confettiColors[Math.floor(Math.random()*confettiColors.length)];
    c.style.animationDuration=(2+Math.random()*1.5)+'s';
    c.style.animationDelay=(Math.random()*0.3)+'s';
    if(Math.random()>0.5)c.style.borderRadius='50%';
    document.body.appendChild(c);
    setTimeout(function(el){return function(){el.remove();};}(c),4000);
  }
}

function showCombo(text){
  var b=document.createElement('div');
  b.className='combo-badge';
  b.textContent=text;
  document.body.appendChild(b);
  setTimeout(function(){b.remove();},1300);
}

var audioCtx=null;
function playSuccess(){
  try{
    if(!audioCtx)audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended')audioCtx.resume();
    var ctx=audioCtx,now=ctx.currentTime;
    var notes=[523.25,659.25,783.99,1046.50];
    notes.forEach(function(freq,i){
      var osc=ctx.createOscillator();
      var gain=ctx.createGain();
      osc.type='sine';
      osc.frequency.value=freq;
      osc.connect(gain);
      gain.connect(ctx.destination);
      var start=now+i*0.09;
      gain.gain.setValueAtTime(0,start);
      gain.gain.linearRampToValueAtTime(0.18,start+0.015);
      gain.gain.exponentialRampToValueAtTime(0.001,start+0.32);
      osc.start(start);
      osc.stop(start+0.35);
    });
  }catch(e){}
}

function popScore(){
  var el=document.getElementById('score');
  el.classList.remove('pop');
  void el.offsetWidth;
  el.classList.add('pop');
}

function countUp(el,from,to){
  var dur=400,start=performance.now();
  function step(t){
    var p=Math.min(1,(t-start)/dur);
    el.textContent=Math.round(from+(to-from)*p);
    if(p<1)requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function startGame(){
  questions=shuffle(allItems).slice(0,ROUND_SIZE);
  qi=0;score=0;lives=3;answered=false;streak=0;
  buildProgress();updateTop();showQuestion();
}

function updateTop(){
  document.getElementById('score').textContent=score;
  var h='';
  for(var i=0;i<3;i++){
    if(i<lives)h+='<span class="heart">❤️</span>';
    else h+='<span class="heart">🖤</span>';
  }
  document.getElementById('lives').innerHTML=h;
  document.getElementById('qnum').textContent=(qi+1)+'/'+questions.length;
}

function loseLifeAnimation(){
  var hearts=document.querySelectorAll('.lives .heart');
  var lostIdx=lives;
  if(hearts[lostIdx]){
    hearts[lostIdx].classList.add('lost');
  }
}

function buildProgress(){
  var p=document.getElementById('progress');p.innerHTML='';
  questions.forEach(function(_,i){
    var d=document.createElement('div');
    d.className='dot'+(i===0?' cur':'');
    d.id='dot'+i;p.appendChild(d);
  });
}

function updateDot(i,cls){var d=document.getElementById('dot'+i);if(d)d.className='dot '+cls;}

function showQuestion(){
  answered=false;updateTop();
  var q=questions[qi];
  var wrong=shuffle(allItems.filter(function(x){return x.w!==q.w&&x.he!==q.he;})).slice(0,3);
  var opts=shuffle([q].concat(wrong));

  var div=document.getElementById('main');
  div.innerHTML='';

  var card=document.createElement('div');card.className='card';
  var unitTag=document.createElement('div');unitTag.className='unit-tag';unitTag.textContent=q.unit;
  card.appendChild(unitTag);
  var ql=document.createElement('div');ql.className='q-label';ql.textContent='מה הפירוש של המילה?';
  card.appendChild(ql);
  var bw=document.createElement('div');bw.className='big-word';bw.textContent=q.w;
  card.appendChild(bw);
  var spk=document.createElement('button');spk.className='speak-btn';spk.innerHTML='🔊 שמע';
  spk.onclick=function(){
    speak(q.w);
    spk.classList.add('playing');
    setTimeout(function(){spk.classList.remove('playing');},1200);
  };
  card.appendChild(spk);
  var mbox=document.createElement('div');mbox.className='meaning-box';mbox.id='mbox';
  card.appendChild(mbox);
  div.appendChild(card);

  var optDiv=document.createElement('div');optDiv.className='options';
  opts.forEach(function(o){
    var btn=document.createElement('button');
    btn.className='opt';
    btn.textContent=o.he;
    btn.onclick=function(){checkAns(btn,o.he,q.he,q.w);};
    optDiv.appendChild(btn);
  });
  div.appendChild(optDiv);

  var fb=document.createElement('div');fb.className='feedback';fb.id='fb';div.appendChild(fb);
  var nxt=document.createElement('button');nxt.className='next-btn';nxt.id='nxt';
  nxt.textContent=(qi+1>=questions.length?'סיום ▶':'הבא ▶');nxt.onclick=nextQ;div.appendChild(nxt);

  setTimeout(function(){speak(q.w);spk.classList.add('playing');setTimeout(function(){spk.classList.remove('playing');},1200);},500);
}

function checkAns(btn,chosen,correct,word){
  if(answered)return;answered=true;
  document.querySelectorAll('.opt').forEach(function(b){b.disabled=true;});
  var fb=document.getElementById('fb');
  var mbox=document.getElementById('mbox');
  if(chosen===correct){
    btn.classList.add('correct');
    streak++;
    var gained=10+(streak>=3?5:0)+(streak>=5?5:0);
    var prev=score;score+=gained;
    countUp(document.getElementById('score'),prev,score);
    popScore();
    fb.className='feedback good';
    fb.textContent='✓ נכון! 🌟 +'+gained;
    mbox.textContent=word+' = '+correct;mbox.style.display='block';
    updateDot(qi,'good');
    makeConfetti(30);
    playSuccess();
    if(streak===3)showCombo('🔥 רצף x3!');
    else if(streak===5)showCombo('⚡ מדהים x5!');
    else if(streak===7)showCombo('💎 מושלם x7!');
    else if(streak===10)showCombo('👑 אגדה x10!');
    setTimeout(nextQ,1500);
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.opt').forEach(function(b){if(b.textContent===correct)b.classList.add('correct');});
    streak=0;
    loseLifeAnimation();
    setTimeout(function(){lives=Math.max(0,lives-1);updateTop();},400);
    fb.className='feedback bad';
    fb.textContent='✗ התשובה הנכונה: '+correct;
    mbox.textContent=word+' = '+correct;mbox.style.display='block';
    speak(word);
    updateDot(qi,'bad');
    document.getElementById('nxt').style.display='block';
  }
}

function nextQ(){
  qi++;
  if(qi>=questions.length||lives<=0)showEnd();
  else showQuestion();
}

function showEnd(){
  if(window.speechSynthesis)window.speechSynthesis.cancel();
  var pct=Math.round(score/(questions.length*10)*100);
  var em,title,sub,stars;
  if(pct>=90){em='🏆';title='מדהים!';sub='את מלכת המילים!';stars=3;}
  else if(pct>=70){em='🌟';title='כל הכבוד!';sub='כמעט מושלם!';stars=2;}
  else if(pct>=50){em='👍';title='טוב!';sub='תרגלי עוד קצת!';stars=2;}
  else{em='💪';title='אל תתייאשי!';sub='בואי נשחק שוב!';stars=1;}
  var starsHtml='';
  for(var i=0;i<3;i++)starsHtml+='<span>'+(i<stars?'⭐':'☆')+'</span>';
  document.getElementById('main').innerHTML=
    '<div class="end">'+
    '<div class="end-emoji">'+em+'</div>'+
    '<div class="end-title">'+title+'</div>'+
    '<div class="stars">'+starsHtml+'</div>'+
    '<div class="end-sub">ניקוד: '+score+' &middot; '+sub+'</div>'+
    '<button class="again-btn" onclick="startGame()">סיבוב חדש ▶</button>'+
    '</div>';
  if(stars>=2){
    makeConfetti(120);
    setTimeout(function(){makeConfetti(80);},800);
    if(stars===3)setTimeout(function(){makeConfetti(80);},1600);
  }
}

makeBubbles();
startGame();
</script>
</body>
