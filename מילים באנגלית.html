<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>חבר מילים! ✏️</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{overflow-x:hidden;}
body{
  font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,'Heebo',Arial,sans-serif;
  background:linear-gradient(135deg,#667eea 0%,#764ba2 50%,#f093fb 100%);
  background-size:200% 200%;
  animation:bgShift 15s ease infinite;
  min-height:100vh;
  display:flex;align-items:flex-start;justify-content:center;
  padding:1rem;
  position:relative;
}
@keyframes bgShift{
  0%,100%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
}

.bg-bubbles{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0;}
.bubble{position:absolute;border-radius:50%;background:rgba(255,255,255,0.15);animation:float 18s infinite linear;bottom:-100px;}
@keyframes float{
  0%{transform:translateY(0) scale(0);opacity:0;}
  10%{opacity:1;}
  90%{opacity:1;}
  100%{transform:translateY(-110vh) scale(1.2);opacity:0;}
}

.game{
  background:rgba(255,255,255,0.97);
  border-radius:28px;
  padding:1.5rem;
  max-width:580px;width:100%;
  box-shadow:0 20px 60px rgba(0,0,0,0.3),inset 0 0 0 1px rgba(255,255,255,0.5);
  position:relative;
  z-index:1;
  animation:gameIn 0.6s cubic-bezier(.34,1.56,.64,1);
}
@keyframes gameIn{
  0%{transform:scale(0.85) translateY(40px);opacity:0;}
  100%{transform:scale(1) translateY(0);opacity:1;}
}

h1{
  text-align:center;
  font-size:32px;
  margin-bottom:0.3rem;
  background:linear-gradient(135deg,#c2185b,#7b1fa2,#3f51b5);
  background-size:200% 200%;
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
  animation:gradTitle 4s ease infinite;
  font-weight:800;
  letter-spacing:-0.5px;
}
@keyframes gradTitle{
  0%,100%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
}
.subtitle{text-align:center;font-size:13px;color:#999;margin-bottom:1rem;font-weight:500;}

.top-bar{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:0.8rem;padding:0.7rem 1rem;
  background:linear-gradient(135deg,#fce4ec,#f3e5f5);
  border-radius:18px;
  box-shadow:0 4px 12px rgba(194,24,91,0.15);
}
.score-box{text-align:center;flex:1;}
.score-num{
  font-size:24px;font-weight:800;color:#c2185b;
  display:inline-block;
}
.score-num.pop{animation:popScore 0.5s ease;}
@keyframes popScore{
  0%,100%{transform:scale(1);color:#c2185b;}
  50%{transform:scale(1.5);color:#43a047;}
}
.score-lbl{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:1.5px;font-weight:600;}
.round-info{
  font-size:14px;color:white;font-weight:700;
  background:linear-gradient(135deg,#c2185b,#7b1fa2);
  padding:8px 16px;border-radius:20px;
  box-shadow:0 4px 12px rgba(194,24,91,0.4);
}

.streak-bar{
  height:8px;background:#eee;border-radius:4px;overflow:hidden;
  margin-bottom:1rem;position:relative;
}
.streak-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,#43a047,#66bb6a,#43a047);
  background-size:200% 100%;
  border-radius:4px;
  transition:width 0.5s cubic-bezier(.34,1.56,.64,1);
  animation:shimmer 2s linear infinite;
}
@keyframes shimmer{
  0%{background-position:0% 50%;}
  100%{background-position:200% 50%;}
}

.arena{
  position:relative;
  display:flex;justify-content:space-between;align-items:stretch;
  gap:0;min-height:340px;margin-bottom:1rem;
}
.col{display:flex;flex-direction:column;gap:10px;width:42%;}
.col-en{align-items:flex-start;}
.col-he{align-items:flex-end;}
svg.lines{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible;}
svg.lines line{
  stroke-dasharray:1000;
  stroke-dashoffset:1000;
  animation:drawLine 0.5s ease forwards;
}
@keyframes drawLine{
  to{stroke-dashoffset:0;}
}

.word-btn{
  padding:12px 14px;border-radius:14px;
  border:none;
  background:white;color:#333;
  font-size:15px;font-weight:600;
  cursor:pointer;
  transition:transform 0.2s cubic-bezier(.34,1.56,.64,1),box-shadow 0.2s;
  text-align:center;width:100%;
  position:relative;
  box-shadow:0 3px 0 #d4d4d4,0 5px 12px rgba(0,0,0,0.1);
  animation:slideInR 0.4s cubic-bezier(.34,1.56,.64,1) backwards;
  font-family:inherit;
}
.col-he .word-btn{animation-name:slideInL;}
@keyframes slideInR{
  from{opacity:0;transform:translateX(40px);}
  to{opacity:1;transform:translateX(0);}
}
@keyframes slideInL{
  from{opacity:0;transform:translateX(-40px);}
  to{opacity:1;transform:translateX(0);}
}
.word-btn:active:not(.matched){transform:translateY(2px);box-shadow:0 1px 0 #d4d4d4,0 2px 6px rgba(0,0,0,0.1);}
.word-btn.selected{
  background:linear-gradient(135deg,#fce4ec,#f8bbd0);
  color:#880e4f;
  box-shadow:0 3px 0 #c2185b,0 0 0 4px rgba(194,24,91,0.25),0 8px 20px rgba(194,24,91,0.4);
  transform:translateY(-2px) scale(1.04);
  animation:pulseSel 1.4s ease infinite;
}
@keyframes pulseSel{
  0%,100%{box-shadow:0 3px 0 #c2185b,0 0 0 4px rgba(194,24,91,0.25),0 8px 20px rgba(194,24,91,0.4);}
  50%{box-shadow:0 3px 0 #c2185b,0 0 0 8px rgba(194,24,91,0.15),0 10px 25px rgba(194,24,91,0.55);}
}
.word-btn.matched{
  background:linear-gradient(135deg,#a5d6a7,#66bb6a);
  color:white;
  box-shadow:0 3px 0 #2e7d32,0 5px 14px rgba(67,160,71,0.4);
  cursor:default;
  animation:matchPop 0.6s cubic-bezier(.34,1.56,.64,1);
}
@keyframes matchPop{
  0%{transform:scale(1);}
  40%{transform:scale(1.18) rotate(-3deg);}
  70%{transform:scale(0.95) rotate(2deg);}
  100%{transform:scale(1) rotate(0);}
}
.word-btn.wrong-flash{
  background:linear-gradient(135deg,#ffcdd2,#ef5350);
  color:white;
  animation:shake 0.5s ease;
}
@keyframes shake{
  0%,100%{transform:translateX(0);}
  20%{transform:translateX(-8px);}
  40%{transform:translateX(8px);}
  60%{transform:translateX(-6px);}
  80%{transform:translateX(6px);}
}

.feedback{
  text-align:center;font-size:18px;font-weight:700;
  min-height:28px;margin-bottom:0.75rem;
}
.feedback.good{color:#2e7d32;animation:goodFb 0.5s cubic-bezier(.34,1.56,.64,1);}
.feedback.bad{color:#c62828;animation:badFb 0.3s ease;}
@keyframes goodFb{
  0%{transform:scale(0.5) translateY(10px);opacity:0;}
  100%{transform:scale(1) translateY(0);opacity:1;}
}
@keyframes badFb{
  0%,100%{transform:translateX(0);}
  25%{transform:translateX(-5px);}
  75%{transform:translateX(5px);}
}

.btn-row{display:flex;gap:10px;}
.next-btn{
  flex:1;padding:14px;border-radius:16px;border:none;
  background:linear-gradient(135deg,#43a047,#66bb6a);
  color:white;font-size:17px;font-weight:700;
  cursor:pointer;display:none;
  box-shadow:0 4px 0 #2e7d32,0 6px 20px rgba(67,160,71,0.4);
  font-family:inherit;
  animation:nextBtnIn 0.5s cubic-bezier(.34,1.56,.64,1);
  position:relative;overflow:hidden;
}
@keyframes nextBtnIn{
  0%{transform:scale(0);opacity:0;}
  100%{transform:scale(1);opacity:1;}
}
.next-btn:active{transform:translateY(3px);box-shadow:0 1px 0 #2e7d32,0 2px 10px rgba(67,160,71,0.4);}
.next-btn::after{
  content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.45),transparent);
  animation:shine 2.2s infinite;
}
@keyframes shine{
  0%{left:-100%;}
  60%,100%{left:100%;}
}

.confetti{
  position:fixed;width:10px;height:14px;
  pointer-events:none;z-index:9999;top:-20px;
  animation:confettiFall linear forwards;
}
@keyframes confettiFall{
  0%{transform:translateY(0) rotate(0);opacity:1;}
  100%{transform:translateY(110vh) rotate(720deg);opacity:0;}
}

.sparkle{
  position:fixed;
  pointer-events:none;
  animation:sparkleAnim 0.9s ease-out forwards;
  font-size:18px;
  z-index:10;
}
@keyframes sparkleAnim{
  0%{transform:translate(0,0) scale(0) rotate(0);opacity:1;}
  30%{opacity:1;}
  100%{transform:translate(var(--dx),var(--dy)) scale(1.6) rotate(360deg);opacity:0;}
}

.combo-badge{
  position:fixed;top:25%;left:50%;
  background:linear-gradient(135deg,#ff6b6b,#ee5a6f);
  color:white;padding:14px 32px;border-radius:30px;
  font-size:24px;font-weight:800;
  box-shadow:0 8px 30px rgba(238,90,111,0.55);
  pointer-events:none;z-index:9998;
  animation:comboShow 1.3s ease forwards;
  white-space:nowrap;
}
@keyframes comboShow{
  0%{transform:translateX(-50%) scale(0) rotate(-15deg);opacity:0;}
  20%{transform:translateX(-50%) scale(1.35) rotate(6deg);opacity:1;}
  40%{transform:translateX(-50%) scale(1) rotate(0);opacity:1;}
  80%{transform:translateX(-50%) scale(1) translateY(0);opacity:1;}
  100%{transform:translateX(-50%) scale(0.8) translateY(-40px);opacity:0;}
}

.end{text-align:center;padding:1.5rem 1rem;animation:gameIn 0.6s cubic-bezier(.34,1.56,.64,1);}
.end-emoji{font-size:90px;margin-bottom:0.3rem;animation:trophyBounce 1.2s ease infinite;display:inline-block;}
@keyframes trophyBounce{
  0%,100%{transform:translateY(0) rotate(-5deg);}
  50%{transform:translateY(-18px) rotate(5deg);}
}
.end-title{
  font-size:32px;font-weight:800;margin-bottom:0.3rem;
  background:linear-gradient(135deg,#c2185b,#7b1fa2);
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.end-sub{font-size:18px;color:#666;margin-bottom:1.2rem;font-weight:600;}
.stars{font-size:42px;margin-bottom:1.2rem;letter-spacing:6px;}
.stars span{display:inline-block;animation:starPop 0.5s cubic-bezier(.34,1.56,.64,1) backwards;}
.stars span:nth-child(1){animation-delay:0.2s;}
.stars span:nth-child(2){animation-delay:0.4s;}
.stars span:nth-child(3){animation-delay:0.6s;}
@keyframes starPop{
  0%{transform:scale(0) rotate(-180deg);opacity:0;}
  100%{transform:scale(1) rotate(0);opacity:1;}
}
.again-btn{
  padding:15px 36px;border-radius:24px;border:none;
  background:linear-gradient(135deg,#c2185b,#7b1fa2);
  color:white;font-size:18px;font-weight:700;cursor:pointer;
  box-shadow:0 4px 0 #4a148c,0 6px 20px rgba(194,24,91,0.4);
  font-family:inherit;
}
.again-btn:active{transform:translateY(3px);box-shadow:0 1px 0 #4a148c,0 2px 10px rgba(194,24,91,0.4);}
</style>
</head>
<body>
<div class="bg-bubbles" id="bubbles"></div>
<div class="game">
  <h1>✏️ חבר מילים!</h1>
  <p class="subtitle">לחץ על מילה באנגלית ואז על התרגום שלה</p>
  <div class="top-bar">
    <div class="score-box"><div class="score-num" id="score">0</div><div class="score-lbl">נקודות</div></div>
    <div class="round-info" id="roundinfo">סיבוב 1</div>
    <div class="score-box"><div class="score-num" id="matched">0/8</div><div class="score-lbl">חוברו</div></div>
  </div>
  <div class="streak-bar"><div class="streak-fill" id="streakfill"></div></div>
  <div class="arena" id="arena">
    <div class="col col-en" id="col-en"></div>
    <svg class="lines" id="svglines"></svg>
    <div class="col col-he" id="col-he"></div>
  </div>
  <div class="feedback" id="fb"></div>
  <div class="btn-row">
    <button class="next-btn" id="nxtbtn" onclick="nextRound()">סיבוב הבא ▶</button>
  </div>
</div>

<script>
var allItems = [
  {w:"bottle", he:"בקבוק"},
  {w:"cellphone", he:"טלפון נייד"},
  {w:"city", he:"עיר"},
  {w:"glass", he:"זכוכית"},
  {w:"leave", he:"לעזוב"},
  {w:"remember", he:"לזכור"},
  {w:"take a shower", he:"להתקלח"},
  {w:"teeth", he:"שיניים"},
  {w:"turn off", he:"לכבות"},
  {w:"usually", he:"בדרך כלל"},
  {w:"wash", he:"לרחוץ"},
  {w:"world", he:"עולם"},
  {w:"back", he:"גב"},
  {w:"fall", he:"לנפול"},
  {w:"finish", he:"לסיים"},
  {w:"forest", he:"יער"},
  {w:"have fun", he:"ליהנות"},
  {w:"kilogram", he:"קילוגרם"},
  {w:"large", he:"גדול"},
  {w:"look like", he:"להיות דומה"},
  {w:"magazine", he:"מגזין"},
  {w:"visit", he:"לבקר"},
  {w:"work", he:"עבודה"},
  {w:"bank", he:"בנק"},
  {w:"between", he:"בין"},
  {w:"cinema", he:"קולנוע"},
  {w:"fast food", he:"מזון מהיר"},
  {w:"museum", he:"מוזיאון"},
  {w:"on the left", he:"משמאל"},
  {w:"on the right", he:"מימין"},
  {w:"river", he:"נהר"},
  {w:"sand", he:"חול"},
  {w:"straight", he:"ישר"},
  {w:"supermarket", he:"סופרמרקט"},
  {w:"because of", he:"בגלל"},
  {w:"better", he:"יותר טוב"},
  {w:"busy", he:"עסוק"},
  {w:"change", he:"לשנות"},
  {w:"here", he:"כאן"},
  {w:"letter", he:"מכתב"},
  {w:"life", he:"חיים"},
  {w:"plan", he:"לתכנן"},
  {w:"send", he:"לשלוח"},
  {w:"too", he:"גם כן"}
];

var ROUND_SIZE = 8;
var pool=[], round=1, score=0, streak=0;
var pairs=[], matchedCount=0;
var selectedEn=null, selectedHe=null;
var locked=false;
var confettiColors=['#c2185b','#7b1fa2','#3f51b5','#43a047','#ff9800','#f44336','#00bcd4','#ffeb3b'];

function shuffle(a){return a.slice().sort(function(){return Math.random()-0.5;});}

function makeBubbles(){
  var c=document.getElementById('bubbles');
  for(var i=0;i<14;i++){
    var b=document.createElement('div');
    b.className='bubble';
    var size=20+Math.random()*80;
    b.style.width=size+'px';
    b.style.height=size+'px';
    b.style.left=(Math.random()*100)+'%';
    b.style.animationDelay=(Math.random()*18)+'s';
    b.style.animationDuration=(14+Math.random()*12)+'s';
    c.appendChild(b);
  }
}

function startGame(){
  pool=shuffle(allItems.slice());
  round=1;score=0;streak=0;
  document.getElementById('score').textContent=score;
  loadRound();
}

function loadRound(){
  matchedCount=0;
  selectedEn=null;selectedHe=null;
  locked=false;
  document.getElementById('fb').textContent='';
  document.getElementById('nxtbtn').style.display='none';
  document.getElementById('roundinfo').textContent='סיבוב '+round;
  document.getElementById('streakfill').style.width='0%';

  var start=(round-1)*ROUND_SIZE;
  if(start>=pool.length){
    pool=shuffle(allItems.slice());
    round=1;start=0;
  }
  pairs=pool.slice(start,start+ROUND_SIZE);
  if(pairs.length<ROUND_SIZE) pairs=pairs.concat(shuffle(allItems).slice(0,ROUND_SIZE-pairs.length));

  document.getElementById('matched').textContent='0/'+pairs.length;

  var enWords=shuffle(pairs.map(function(p){return p.w;}));
  var heWords=shuffle(pairs.map(function(p){return p.he;}));

  var colEn=document.getElementById('col-en');
  var colHe=document.getElementById('col-he');
  colEn.innerHTML='';colHe.innerHTML='';
  document.getElementById('svglines').innerHTML='';

  enWords.forEach(function(w,i){
    var btn=document.createElement('button');
    btn.className='word-btn';
    btn.textContent=w;
    btn.dataset.word=w;
    btn.dataset.side='en';
    btn.style.animationDelay=(i*0.06)+'s';
    btn.onclick=function(){selectWord(btn,'en',w);};
    colEn.appendChild(btn);
  });

  heWords.forEach(function(h,i){
    var btn=document.createElement('button');
    btn.className='word-btn';
    btn.textContent=h;
    btn.dataset.he=h;
    btn.dataset.side='he';
    btn.style.animationDelay=(i*0.06+0.05)+'s';
    btn.onclick=function(){selectWord(btn,'he',h);};
    colHe.appendChild(btn);
  });
}

function selectWord(btn,side,val){
  if(locked)return;
  if(btn.classList.contains('matched'))return;

  if(side==='en'){
    document.querySelectorAll('#col-en .word-btn.selected').forEach(function(b){b.classList.remove('selected');});
    if(selectedEn===btn){selectedEn=null;return;}
    btn.classList.add('selected');
    selectedEn=btn;
  } else {
    document.querySelectorAll('#col-he .word-btn.selected').forEach(function(b){b.classList.remove('selected');});
    if(selectedHe===btn){selectedHe=null;return;}
    btn.classList.add('selected');
    selectedHe=btn;
  }

  if(selectedEn&&selectedHe){checkMatch();}
}

function getCenter(el){
  var arena=document.getElementById('arena');
  var arenaRect=arena.getBoundingClientRect();
  var rect=el.getBoundingClientRect();
  return {x:rect.left-arenaRect.left+rect.width/2, y:rect.top-arenaRect.top+rect.height/2};
}

function drawLine(enBtn, heBtn, color){
  var svg=document.getElementById('svglines');
  var a=getCenter(enBtn);
  var b=getCenter(heBtn);
  var line=document.createElementNS('http://www.w3.org/2000/svg','line');
  line.setAttribute('x1',a.x);line.setAttribute('y1',a.y);
  line.setAttribute('x2',b.x);line.setAttribute('y2',b.y);
  line.setAttribute('stroke',color);
  line.setAttribute('stroke-width','3');
  line.setAttribute('stroke-linecap','round');
  svg.appendChild(line);
  return line;
}

function makeSparkles(btn){
  var rect=btn.getBoundingClientRect();
  var emojis=['✨','⭐','💫','🌟'];
  for(var i=0;i<6;i++){
    var s=document.createElement('div');
    s.className='sparkle';
    s.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    s.style.left=(rect.left+rect.width/2)+'px';
    s.style.top=(rect.top+rect.height/2)+'px';
    var angle=(Math.PI*2/6)*i+Math.random()*0.5;
    var dist=40+Math.random()*30;
    s.style.setProperty('--dx',Math.cos(angle)*dist+'px');
    s.style.setProperty('--dy',Math.sin(angle)*dist+'px');
    document.body.appendChild(s);
    setTimeout(function(el){return function(){el.remove();};}(s),900);
  }
}

function makeConfetti(count){
  for(var i=0;i<count;i++){
    var c=document.createElement('div');
    c.className='confetti';
    c.style.left=(Math.random()*100)+'%';
    c.style.background=confettiColors[Math.floor(Math.random()*confettiColors.length)];
    c.style.animationDuration=(2+Math.random()*1.5)+'s';
    c.style.animationDelay=(Math.random()*0.4)+'s';
    if(Math.random()>0.5)c.style.borderRadius='50%';
    document.body.appendChild(c);
    setTimeout(function(el){return function(){el.remove();};}(c),4000);
  }
}

function showCombo(text){
  var b=document.createElement('div');
  b.className='combo-badge';
  b.textContent=text;
  document.body.appendChild(b);
  setTimeout(function(){b.remove();},1300);
}

function popScore(){
  var el=document.getElementById('score');
  el.classList.remove('pop');
  void el.offsetWidth;
  el.classList.add('pop');
}

function countUp(el,from,to){
  var dur=400,start=performance.now();
  function step(t){
    var p=Math.min(1,(t-start)/dur);
    el.textContent=Math.round(from+(to-from)*p);
    if(p<1)requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function checkMatch(){
  var enWord=selectedEn.dataset.word;
  var heWord=selectedHe.dataset.he;
  var correct=null;
  pairs.forEach(function(p){if(p.w===enWord)correct=p.he;});

  if(correct===heWord){
    selectedEn.classList.remove('selected');
    selectedHe.classList.remove('selected');
    selectedEn.classList.add('matched');
    selectedHe.classList.add('matched');
    selectedEn.onclick=null;
    selectedHe.onclick=null;
    drawLine(selectedEn,selectedHe,'#43a047');
    makeSparkles(selectedEn);
    makeSparkles(selectedHe);
    matchedCount++;
    streak++;
    var gained=10+(streak>=3?5:0)+(streak>=5?5:0);
    var prevScore=score;
    score+=gained;
    countUp(document.getElementById('score'),prevScore,score);
    popScore();
    document.getElementById('matched').textContent=matchedCount+'/'+pairs.length;
    document.getElementById('streakfill').style.width=(matchedCount/pairs.length*100)+'%';
    document.getElementById('fb').className='feedback good';
    document.getElementById('fb').textContent='✓ נכון! '+enWord+' = '+heWord+' 🌟';

    if(streak===3)showCombo('🔥 רצף x3!');
    else if(streak===5)showCombo('⚡ מדהים x5!');
    else if(streak===7)showCombo('💎 מושלם x7!');

    if(matchedCount===pairs.length){
      setTimeout(roundComplete,500);
    }
    selectedEn=null;selectedHe=null;
  } else {
    locked=true;
    var line=drawLine(selectedEn,selectedHe,'#e53935');
    selectedEn.classList.add('wrong-flash');
    selectedHe.classList.add('wrong-flash');
    streak=0;
    document.getElementById('fb').className='feedback bad';
    document.getElementById('fb').textContent='✗ לא נכון, נסי שוב!';
    var enRef=selectedEn,heRef=selectedHe;
    setTimeout(function(){
      if(line&&line.parentNode)line.parentNode.removeChild(line);
      enRef.classList.remove('selected','wrong-flash');
      heRef.classList.remove('selected','wrong-flash');
      document.getElementById('fb').textContent='';
      locked=false;
    },800);
    selectedEn=null;selectedHe=null;
  }
}

function roundComplete(){
  document.getElementById('fb').className='feedback good';
  document.getElementById('fb').textContent='🎉 כל הכבוד! סיימת את הסיבוב!';
  document.getElementById('nxtbtn').style.display='block';
  makeConfetti(50);
  round++;
}

function nextRound(){
  if((round-1)*ROUND_SIZE>=allItems.length){
    showEnd();
  } else {
    loadRound();
  }
}

function showEnd(){
  document.getElementById('arena').innerHTML='';
  document.getElementById('fb').textContent='';
  document.getElementById('nxtbtn').style.display='none';
  document.querySelector('.top-bar').style.display='none';
  document.querySelector('.streak-bar').style.display='none';
  document.querySelector('.subtitle').style.display='none';
  document.querySelector('h1').style.display='none';
  var main=document.querySelector('.game');
  var maxScore=allItems.length*10;
  var ratio=score/maxScore;
  var stars=ratio>=0.9?3:ratio>=0.7?2:1;
  var starsHtml='';
  for(var i=0;i<3;i++)starsHtml+='<span>'+(i<stars?'⭐':'☆')+'</span>';
  var end=document.createElement('div');end.className='end';
  end.innerHTML=
    '<div class="end-emoji">🏆</div>'+
    '<div class="end-title">מדהים! סיימת הכל!</div>'+
    '<div class="stars">'+starsHtml+'</div>'+
    '<div class="end-sub">ניקוד סופי: '+score+' נקודות</div>'+
    '<button class="again-btn" onclick="location.reload()">שחקי שוב ▶</button>';
  main.appendChild(end);
  makeConfetti(120);
  setTimeout(function(){makeConfetti(80);},800);
  setTimeout(function(){makeConfetti(60);},1600);
}

makeBubbles();
startGame();
</script>
</body>
</html>
